<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Editor QA Comparison</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #0f172a;
        color: white;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .labels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 42px;
        align-items: center;
        padding: 0 18px;
        font-size: 14px;
        font-weight: 700;
      }

      .comparison {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        background: white;
      }

      img {
        display: block;
        width: 100%;
        aspect-ratio: 1440 / 1024;
        object-fit: cover;
        object-position: top center;
      }
    </style>
  </head>
  <body>
    <div class="labels">
      <span>Source visual target</span>
      <span>Rendered implementation</span>
    </div>
    <div class="comparison">
      <img src="/reference/command-workbench-target.png" alt="Source visual target" />
      <img src="/reference/qa-implementation.png" alt="Rendered implementation" />
    </div>
  </body>
</html>
